  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
/* Hoggard Time Capsule — Light, Warm, Tactile */

:root {
  --paper:        #f6f2ea;
  --paper-warm:   #efe7d8;
  --paper-cool:   #eaeef2;
  --ink:          #1c1a17;
  --ink-soft:     #4a463f;
  --ink-mute:     #807a70;
  --ink-faint:    #b3ad9f;
  --line:         rgba(28, 26, 23, 0.10);
  --line-strong:  rgba(28, 26, 23, 0.22);

  --accent:       #5aa4df;
  --accent-soft:  #8bbfe4;
  --accent-deep:  #21386c;
  --hog-blue:     #5aa4df;
  --hog-navy:     #21386c;

  --glass-blur: 22px;
  --glass-fill:        rgba(255, 255, 255, 0.55);
  --glass-fill-strong: rgba(255, 255, 255, 0.75);
  --glass-fill-tinted: rgba(230, 241, 252, 0.65);
  --glass-border:        rgba(255, 255, 255, 0.85);
  --glass-border-soft:   rgba(28, 26, 23, 0.08);
  --glass-shadow:        0 1px 0 rgba(255,255,255,0.7) inset, 0 12px 30px -12px rgba(28,26,23,0.18), 0 4px 10px -4px rgba(28,26,23,0.10);
  --glass-shadow-hover:  0 1px 0 rgba(255,255,255,0.9) inset, 0 22px 40px -16px rgba(28,26,23,0.25), 0 8px 16px -6px rgba(28,26,23,0.12);

  --font-sans:   "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-serif:  "Fraunces", "Iowan Old Style", Georgia, serif;
  --font-script: "Caveat", "Bradley Hand", cursive;
  --font-mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --type-scale:  1;

  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%, rgba(90, 164, 223, 0.15), transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 25%, rgba(33, 56, 108, 0.10), transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(90, 164, 223, 0.08), transparent 70%),
    linear-gradient(180deg, #ffffff 0%, #f9f9f9 50%, #f4f4f2 100%);
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(28,26,23,0.018) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(28,26,23,0.022) 0, transparent 40%);
  mix-blend-mode: multiply;
}

#root { position: relative; z-index: 1; }

/* === Glass === */
.glass {
  position: relative;
  background: var(--glass-fill);
  backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: var(--glass-shadow);
  transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease), background 0.3s var(--ease);
  overflow: hidden;
}
.glass::before {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 50%);
  pointer-events: none;
}
.glass-tinted  { background: var(--glass-fill-tinted); border-color: rgba(139, 191, 228, 0.4); }
.glass-strong  { background: var(--glass-fill-strong); }
.glass-hover:hover {
  transform: translateY(-3px);
  box-shadow: var(--glass-shadow-hover);
  background: var(--glass-fill-strong);
}

/* === Type === */
h1, h2, h3, h4 { font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.015em; margin: 0; color: var(--ink); }
.display {
  font-family: var(--font-serif);
  font-size: clamp(2.6rem, 6vw, calc(5.4rem * var(--type-scale)));
  font-weight: 400; line-height: 1.0; letter-spacing: -0.025em; color: var(--ink);
}
.display em { font-style: italic; color: var(--accent-deep); }
.eyebrow {
  font-family: var(--font-mono);
  font-size: calc(0.72rem * var(--type-scale));
  font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute);
}
.lede { font-size: calc(1.15rem * var(--type-scale)); line-height: 1.6; color: var(--ink-soft); font-family: var(--font-serif); font-weight: 400; }
.muted        { color: var(--ink-mute); }
.muted-strong { color: var(--ink-soft); }
p { line-height: 1.65; color: var(--ink-soft); }

/* === Layout === */
.shell        { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
.shell-narrow { max-width: 880px;  margin: 0 auto; padding: 0 32px; }

/* === Nav === */
.nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px 8px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 12px 30px -10px rgba(28,26,23,0.18);
  max-width: calc(100vw - 32px);
}
.nav-brand {
  display: flex; align-items: center; gap: 10px; padding-right: 12px;
  border-right: 1px solid var(--line);
  font-family: var(--font-serif); font-weight: 500; font-size: 14px; letter-spacing: -0.01em; color: var(--ink);
}
.nav-brand-mark {
  width: 26px; height: 26px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 2px 6px rgba(90,164,223,0.4);
  display: grid; place-items: center;
  font-family: var(--font-serif); font-size: 13px; font-weight: 600; color: #fff;
}
.nav-links { display: flex; gap: 2px; flex-wrap: wrap; }
.nav-link {
  appearance: none; border: 0; background: transparent;
  color: var(--ink-soft); font: inherit; font-size: 13px; font-weight: 500;
  padding: 8px 14px; border-radius: 999px; cursor: default;
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover { color: var(--ink); background: rgba(28,26,23,0.05); }
.nav-link.active { color: var(--ink); background: rgba(90,164,223,0.12); box-shadow: 0 0 0 1px rgba(90,164,223,0.28) inset; }

/* Nav label swap */
.nav-link-short { display: none; }
@media (max-width: 1180px) {
  .nav-link-full  { display: none; }
  .nav-link-short { display: inline; }
  .nav-link { padding: 7px 11px; font-size: 12.5px; }
}

/* === Buttons === */
.btn {
  appearance: none; border: 0; cursor: default;
  font: inherit; font-weight: 500; font-size: 14px;
  padding: 12px 22px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.3s var(--ease);
}
.btn-primary {
  background: var(--ink); color: var(--paper);
  box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 6px 16px -4px rgba(28,26,23,0.4);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 10px 24px -6px rgba(28,26,23,0.5); }
.btn-ghost {
  background: rgba(255,255,255,0.6); color: var(--ink);
  border: 1px solid var(--line-strong); backdrop-filter: blur(12px);
}
.btn-ghost:hover { background: rgba(255,255,255,0.85); }

/* === Photo placeholder === */
.photo {
  position: relative;
  background: linear-gradient(135deg, #d9d2c4 0%, #c5bdac 100%);
  overflow: hidden; border-radius: 16px;
}
.photo::after {
  content: attr(data-label);
  position: absolute; bottom: 10px; left: 12px;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em;
  color: rgba(28,26,23,0.7);
  background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
  padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(28,26,23,0.08);
}
.photo-stripes {
  background-image: linear-gradient(135deg, transparent 0%, transparent 49.5%, rgba(28,26,23,0.04) 49.5%, rgba(28,26,23,0.04) 50.5%, transparent 50.5%);
  background-size: 24px 24px;
}
.photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* === Page transitions === */
.page-enter { animation: pageIn 0.5s var(--ease) both; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(28,26,23,0.18); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(28,26,23,0.32); background-clip: padding-box; border: 2px solid transparent; }

/* === Footer === */
.footer {
  margin-top: 120px; padding: 60px 32px 40px;
  text-align: center; border-top: 1px solid var(--line);
  font-size: 12.5px; color: var(--ink-mute);
  font-family: var(--font-mono); letter-spacing: 0.04em;
}
.footer-seal {
  display: inline-block; margin-bottom: 18px;
  padding: 8px 16px; border: 1px solid rgba(90,164,223,0.3); border-radius: 999px;
  background: rgba(90,164,223,0.08); color: var(--accent-deep);
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
}

/* === Utility === */
.spacer-xs { height: 12px; }
.spacer-s  { height: 24px; }
.spacer-m  { height: 48px; }
.spacer-l  { height: 80px; }
.spacer-xl { height: 120px; }

.row      { display: flex; gap: 16px; }
.row-wrap { display: flex; gap: 16px; flex-wrap: wrap; }
.col      { display: flex; flex-direction: column; gap: 16px; }

.tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px; border-radius: 999px;
  background: rgba(90,164,223,0.10); border: 1px solid rgba(90,164,223,0.25);
  font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em; color: var(--accent-deep);
}
.tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(90,164,223,0.5); }

/* === Content slot === */
.slot {
  border: 1px dashed rgba(28,26,23,0.25); border-radius: 12px;
  padding: 16px 18px; font-family: var(--font-mono); font-size: 11.5px;
  color: var(--ink-mute); background: rgba(255,255,255,0.4); letter-spacing: 0.02em;
}
.slot-label {
  display: inline-block; font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent-deep); margin-bottom: 6px; font-weight: 600;
}

/* === Mobile Nav === */
.nav-hamburger {
  display: none;
  appearance: none; border: 0; background: transparent; cursor: default;
  padding: 8px; border-radius: 8px; margin-left: 4px;
  flex-direction: column; gap: 5px; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.nav-hamburger:hover { background: rgba(28,26,23,0.06); }
.nav-hamburger span {
  display: block; width: 18px; height: 2px;
  background: var(--ink-soft); border-radius: 2px;
  transition: all 0.2s;
}
.nav-mobile-overlay {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(28,26,23,0.2);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.nav-mobile-dropdown {
  position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
  width: min(340px, calc(100vw - 32px));
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 20px 40px -10px rgba(28,26,23,0.25);
  padding: 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-mobile-item {
  appearance: none; border: 0; background: transparent; cursor: default;
  font: inherit; font-size: 15px; font-weight: 500; color: var(--ink-soft);
  padding: 12px 16px; border-radius: 12px; text-align: left;
  display: flex; align-items: center; gap: 14px;
  transition: color 0.15s, background 0.15s; width: 100%;
}
.nav-mobile-item:hover { color: var(--ink); background: rgba(28,26,23,0.05); }
.nav-mobile-item.active { color: var(--ink); background: rgba(90,164,223,0.10); }
.nav-mobile-num {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent-deep);
  letter-spacing: 0.06em; width: 24px; flex-shrink: 0;
}
@media (max-width: 860px) {
  .nav-links { display: none; }
  .nav-hamburger { display: flex; }
}

/* === Responsive === */
@media (max-width: 720px) {
  .shell, .shell-narrow { padding: 0 20px; }
  .nav { padding: 6px 8px; gap: 2px; }
  .nav-brand { font-size: 12px; padding-right: 8px; }
  .nav-link { padding: 6px 9px; font-size: 12px; }
}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    /* === tweaks-panel.jsx === */

    const __TWEAKS_STYLE = `
      .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
        max-height:calc(100vh - 32px);display:flex;flex-direction:column;
        background:rgba(250,249,247,.78);color:#29261b;
        -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);

      .twk-hd{display:flex;align-items:center;justify-content:space-between;
        padding:10px 8px 10px 14px;cursor:move;user-select:none}
      .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
      .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
        width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
      .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
      .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
        overflow-y:auto;overflow-x:hidden;min-height:0;
        scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
      .twk-body::-webkit-scrollbar{width:8px}
      .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
      .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
        border:2px solid transparent;background-clip:content-box}
      .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
        border:2px solid transparent;background-clip:content-box}
      .twk-row{display:flex;flex-direction:column;gap:5px}
      .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
      .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
      .twk-lbl>span:first-child{font-weight:500}
      .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
      .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
        color:rgba(41,38,27,.45);padding:10px 0 0}
      .twk-sect:first-child{padding-top:0}
      .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
        border:.5px solid rgba(0,0,0,.1);border-radius:7px;
        background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
      .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
      .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
        border-radius:999px;background:rgba(0,0,0,.12);outline:none}
      .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
        width:14px;height:14px;border-radius:50%;background:#fff;
        border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
      .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
        background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
      .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
        background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
      .twk-toggle[data-on="1"]{background:#34c759}
      .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
        background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
      .twk-toggle[data-on="1"] i{transform:translateX(14px)}
    `;

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right  = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      React.useEffect(() => {
        if (!open) return;
        clampToViewport();
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode')   setOpen(true);
          if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight  = window.innerWidth  - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: startRight  - (ev.clientX - sx),
            y: startBottom - (ev.clientY - sy),
          };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel"
               style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>

              <article key={i} className="glass letter-card" style={{ padding: "52px 56px", borderRadius: 22, background: i === 0 ? "var(--glass-fill-strong)" : "var(--glass-fill-tinted)" }}>
                <div style={{ fontFamily: "var(--font-serif)", fontSize: "1.05rem", lineHeight: 1.8, color: "var(--ink-soft)" }}>
                  <div style={{ fontSize: "1.4rem", fontWeight: 500, marginBottom: 26, color: "var(--ink)", letterSpacing: "-0.01em" }}>Dear reader,</div>
                  <Slot label={`Letter from ${letter.name}`} hint="Letter to be pasted in here before sealing." style={{ marginBottom: 28, padding: "22px 24px", fontSize: 13 }} />
                  <div style={{ marginTop: 30, paddingTop: 24, borderTop: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 20, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontFamily: "var(--font-script)", fontSize: "2rem", color: "var(--ink)", lineHeight: 1 }}>— {letter.name.split(" ")[0]}</div>
                      <div style={{ fontSize: 12.5, color: "var(--ink-mute)", marginTop: 8, fontFamily: "var(--font-mono)", letterSpacing: "0.04em" }}>{letter.name} · {letter.grade} · April 2026</div>
                    </div>
                  </div>
                </div>
              </article>
            ))}
          </div>

          <div className="shell-narrow" style={{ paddingTop: 80, paddingBottom: 60, textAlign: "center" }}>
            <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: 18, padding: "40px 60px", borderRadius: 24, background: "var(--glass-fill-tinted)", border: "1px solid rgba(90,164,223,0.25)", backdropFilter: "blur(20px)", boxShadow: "0 1px 0 rgba(255,255,255,0.7) inset, 0 12px 30px -10px rgba(90,164,223,0.25)" }}>
              <div style={{ width: 88, height: 88, borderRadius: "50%", background: "radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), var(--accent) 50%, var(--accent-deep) 90%)", boxShadow: "0 1px 0 rgba(255,255,255,0.4) inset, 0 8px 24px rgba(90,164,223,0.5)", border: "1px solid rgba(255,255,255,0.3)", display: "grid", placeItems: "center", fontFamily: "var(--font-serif)", fontSize: 32, fontWeight: 600, color: "#fff", letterSpacing: "-0.02em" }}>H</div>
              <div>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.18em", color: "var(--accent-deep)", textTransform: "uppercase", marginBottom: 8 }}>Sealed April 2026</div>
                <div style={{ fontSize: "1.6rem", fontFamily: "var(--font-serif)", letterSpacing: "-0.02em", fontWeight: 500 }}>Don't open until 2035.</div>
                <div style={{ fontSize: 13, color: "var(--ink-mute)", marginTop: 10, maxWidth: 380 }}>Delivered to the Principal of Hoggard High School, with one instruction.</div>
              </div>
            </div>
          </div>

          <style>{`
            @media (max-width: 720px) { .letter-card { padding: 36px 28px !important; } }
          `}</style>

          <Footer />
        </div>
      );
    }

    /* === App === */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "glassBlur": 22,
      "noteRotation": 6,
      "typeScale": 1,
      "warmth": 1.05
    }/*EDITMODE-END*/;

    /* === PasswordGate === */

    function PasswordGate({ children }) {
      const KEY = "tc_auth_26";
      const PASS = "4305blvd";
      const [unlocked, setUnlocked] = React.useState(() => sessionStorage.getItem(KEY) === "1");
      const [input, setInput] = React.useState("");
      const [shake, setShake] = React.useState(false);

      if (unlocked) return children;

      const attempt = () => {
        if (input === PASS) {
          sessionStorage.setItem(KEY, "1");
          setUnlocked(true);
        } else {
          setShake(true);
          setInput("");
          setTimeout(() => setShake(false), 600);
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(180deg, #ffffff 0%, #f9f9f9 50%, #f4f4f2 100%)" }}>
          <div style={{
            padding: "48px 52px", borderRadius: 28, maxWidth: 400, width: "calc(100vw - 48px)",
            background: "rgba(255,255,255,0.7)",
            backdropFilter: "blur(28px) saturate(160%)",
            WebkitBackdropFilter: "blur(28px) saturate(160%)",
            border: "1px solid rgba(255,255,255,0.85)",
            boxShadow: "0 1px 0 rgba(255,255,255,0.9) inset, 0 24px 60px -20px rgba(28,26,23,0.22)",
            textAlign: "center",
            animation: shake ? "pwShake 0.5s ease" : "none",
          }}>
            <div style={{
              width: 64, height: 64, borderRadius: 18, margin: "0 auto 24px",
              background: "linear-gradient(135deg, var(--accent), var(--accent-deep))",
              display: "grid", placeItems: "center",
              fontFamily: "var(--font-serif)", fontSize: 28, fontWeight: 600, color: "#fff",
              boxShadow: "0 1px 0 rgba(255,255,255,0.4) inset, 0 8px 20px rgba(90,164,223,0.4)",
            }}>H</div>
            <h1 style={{ fontSize: "1.8rem", fontFamily: "var(--font-serif)", letterSpacing: "-0.025em", marginBottom: 8 }}>Hoggard '26</h1>
            <p style={{ fontSize: 14, color: "var(--ink-mute)", marginBottom: 32, fontFamily: "var(--font-mono)", letterSpacing: "0.02em" }}>
              Time Capsule · Sealed April 2026
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <input
                type="password"
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && attempt()}
                placeholder="enter password"
                autoFocus
                style={{
                  width: "100%", padding: "14px 18px", borderRadius: 12,
                  border: "1px solid var(--line-strong)",
                  background: "rgba(255,255,255,0.8)",
                  font: "inherit", fontSize: 15, color: "var(--ink)",
                  outline: "none", textAlign: "center",
                  letterSpacing: "0.08em", fontFamily: "var(--font-mono)",
                }}
              />
              <button className="btn btn-primary" onClick={attempt} style={{ width: "100%", justifyContent: "center" }}>
                Open the capsule →
              </button>
            </div>
          </div>
          <style>{`
            @keyframes pwShake {
              0%,100% { transform: translateX(0); }
              20% { transform: translateX(-10px); }
              40% { transform: translateX(10px); }
              60% { transform: translateX(-8px); }
              80% { transform: translateX(8px); }
            }
          `}</style>
        </div>
      );
    }

    /* === App === */

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPage] = React.useState(() => {
        const hash = (window.location.hash || "#home").slice(1);
        return PAGES.find(p => p.id === hash) ? hash : "home";
      });

      React.useEffect(() => {
        window.location.hash = page;
        window.scrollTo({ top: 0, behavior: "instant" });
      }, [page]);

      React.useEffect(() => {
        const onHash = () => {
          const h = (window.location.hash || "#home").slice(1);
          if (PAGES.find(p => p.id === h)) setPage(h);
        };
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);

      React.useEffect(() => {
        const r = document.documentElement;
        r.style.setProperty("--glass-blur", t.glassBlur + "px");
        r.style.setProperty("--type-scale", String(t.typeScale));
        const w = t.warmth;
        document.body.style.background = `
          radial-gradient(ellipse 70% 50% at 15% 5%, rgba(90, 164, 223, ${0.15 * w}), transparent 60%),
          radial-gradient(ellipse 60% 50% at 90% 25%, rgba(33, 56, 108, ${0.10 * (2 - w)}), transparent 60%),
          radial-gradient(ellipse 80% 60% at 50% 100%, rgba(90, 164, 223, ${0.08 * w}), transparent 70%),
          linear-gradient(180deg, #ffffff 0%, #f9f9f9 50%, #f4f4f2 100%)
        `;
        document.body.style.backgroundAttachment = "fixed";
      }, [t.glassBlur, t.typeScale, t.warmth]);

      const renderPage = () => {
        switch (page) {
          case "home":     return <HomePage     setPage={setPage} />;
          case "voices":   return <VoicesPage   rotationAmount={t.noteRotation} />;
          case "teachers": return <TeachersPage />;
          case "today":    return <TodayPage    />;
          case "numbers":  return <NumbersPage  />;
          case "letter":   return <LetterPage   />;
          default:         return <HomePage     setPage={setPage} />;
        }
      };

      return (
        <>
          <Nav page={page} setPage={setPage} />
          <main key={page}>{renderPage()}</main>
          <TweaksPanel title="Tweaks">
            <TweakSection label="Glass" />
            <TweakSlider label="Blur" value={t.glassBlur} min={0} max={60} unit="px"
                         onChange={(v) => setTweak('glassBlur', v)} />
            <TweakSection label="Background warmth" />
            <TweakSlider label="Warm ↔ Cool" value={t.warmth} min={0.2} max={1.6} step={0.05}
                         onChange={(v) => setTweak('warmth', v)} />
            <TweakSection label="Sticky notes" />
            <TweakSlider label="Rotation" value={t.noteRotation} min={0} max={20} unit="°"
                         onChange={(v) => setTweak('noteRotation', v)} />
            <TweakSection label="Typography" />
            <TweakSlider label="Type scale" value={t.typeScale} min={0.8} max={1.4} step={0.05}
                         onChange={(v) => setTweak('typeScale', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <PasswordGate><App /></PasswordGate>
    );
  </script>
</body>
</html>
